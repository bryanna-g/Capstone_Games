<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgroVoltaics: Pro Battery Field</title>
    <style>
        :root { --sun: #fbbf24; --panel: #1e3a8a; --bg-sky: #7dd3fc; }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; height: 100vh; overflow: hidden; color: white; transition: background 1s; }
        
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .modal { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; }
        
        .selection-group { margin: 20px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .chip { padding: 10px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        .chip.active { background: var(--sun); color: #92400e; border-color: var(--sun); font-weight: bold; }

        .btn { background: #22c55e; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; }
        
        /* HUD and Battery Styling */
        .hud { position: absolute; top: 25px; width: 100%; display: flex; justify-content: space-around; align-items: center; z-index: 10; pointer-events: none; }
        .stat { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); padding: 12px 20px; border-radius: 15px; text-align: center; min-width: 90px; border: 1px solid rgba(255,255,255,0.1); }
        .label { font-size: 0.6rem; opacity: 0.8; display: block; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .val { font-size: 1.1rem; font-weight: 800; }

        .battery-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .battery-shell { width: 35px; height: 65px; border: 3px solid white; border-radius: 5px; position: relative; padding: 2px; }
        .battery-shell::after { content: ''; position: absolute; top: -8px; left: 8px; width: 13px; height: 6px; background: white; border-radius: 2px 2px 0 0; }
        .battery-fill { width: 100%; height: 0%; background: #22c55e; position: absolute; bottom: 0; left: 0; transition: height 0.4s ease; border-radius: 1px; box-shadow: 0 0 10px #22c55e; }
    </style>
</head>
<body>

<div id="setupScreen" class="overlay">
    <div class="modal">
        <h2 style="margin-top:0">🚜 Farm Setup</h2>
        <label class="label">Choose Climate</label>
        <div class="selection-group" id="climateGroup">
            <div class="chip active" onclick="setClimate('desert', this)">🌵 Desert</div>
            <div class="chip" onclick="setClimate('temperate', this)">🌲 Temperate</div>
            <div class="chip" onclick="setClimate('tropical', this)">🌴 Tropical</div>
        </div>
        <label class="label">Choose Initial Crop</label>
        <div class="selection-group" id="cropGroup">
            <div class="chip active" onclick="setCrop('lettuce', this)">🥬 Lettuce</div>
            <div class="chip" onclick="setCrop('tomato', this)">🍅 Tomato</div>
            <div class="chip" onclick="setCrop('melon', this)">🍉 Melon</div>
        </div>
        <button class="btn" onclick="startGame()">START MISSION</button>
    </div>
</div>

<div class="hud">
    <div class="stat"><span class="label">⚡ Power</span><span id="pwr" class="val">0kW</span></div>
    
    <div class="battery-box">
        <div class="battery-shell">
            <div id="batFill" class="battery-fill"></div>
        </div>
        <span class="label" style="opacity: 1">Energy Storage</span>
    </div>

    <div class="stat"><span class="label">🌱 Health</span><span id="hlth" class="val">100%</span></div>
</div>

<canvas id="stage"></canvas>

<script>
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let w, h, active = false;

let gameConfig = {
    climate: 'desert',
    crop: 'lettuce',
    sunSpeed: 7000,
    heatDamage: 0.08,
    stormFreq: 0.7
};

let tilt = 0, sunPos = 0, energy = 0, health = 100, weatherMult = 1.0;
const ENERGY_GOAL = 500; // Goal to fill the battery

function setClimate(type, el) {
    gameConfig.climate = type;
    document.querySelectorAll('#climateGroup .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    if(type === 'desert') { gameConfig.sunSpeed = 5000; gameConfig.heatDamage = 0.12; }
    if(type === 'temperate') { gameConfig.sunSpeed = 8000; gameConfig.heatDamage = 0.05; }
    if(type === 'tropical') { gameConfig.sunSpeed = 10000; gameConfig.heatDamage = 0.03; }
}

function setCrop(type, el) {
    gameConfig.crop = type;
    document.querySelectorAll('#cropGroup .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
}

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

async function startGame() {
    document.getElementById('setupScreen').style.display = 'none';
    if (typeof DeviceOrientationEvent !== 'undefined' && DeviceOrientationEvent.requestPermission) {
        try { await DeviceOrientationEvent.requestPermission(); } catch(e){}
    }
    window.addEventListener('deviceorientation', (e) => { tilt = Math.max(-45, Math.min(45, e.gamma || 0)); });
    window.addEventListener('mousemove', (e) => { if (!('ontouchstart' in window)) tilt = ((e.clientX / w) - 0.5) * 80; });
    
    const block = () => { weatherMult = 0.2; };
    const release = () => { weatherMult = 1.0; };
    window.addEventListener('mousedown', block); window.addEventListener('mouseup', release);
    window.addEventListener('touchstart', block); window.addEventListener('touchend', release);

    active = true;
    requestAnimationFrame(loop);
}

function drawSun() {
    const x = (w / 2) + (Math.sin(Date.now() / gameConfig.sunSpeed) * (w * 0.4));
    const y = h * 0.18;
    sunPos = (x / w - 0.5) * 90;

    const grad = ctx.createRadialGradient(x, y, 10, x, y, 50);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.4, '#fbbf24');
    grad.addColorStop(1, 'transparent');
    
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, 60, 0, Math.PI * 2);
    ctx.fill();
}

function loop() {
    if(!active) return;
    ctx.clearRect(0,0,w,h);
    
    // Background and Environment
    let skyColor = weatherMult < 0.5 ? '#1e293b' : (gameConfig.climate === 'desert' ? '#bae6fd' : '#7dd3fc');
    let groundColor = weatherMult < 0.5 ? '#334155' : (gameConfig.climate === 'desert' ? '#fbbf24' : '#22c55e');
    
    document.body.style.background = skyColor;
    ctx.fillStyle = groundColor;
    ctx.fillRect(0, h * 0.45, w, h);

    drawSun();

    // Game Logic
    let alignment = Math.abs(tilt - sunPos);
    energy += Math.max(0, Math.cos(alignment * Math.PI / 180)) * weatherMult * 0.2;
    
    let target = (gameConfig.crop === 'lettuce') ? 30 : (gameConfig.crop === 'tomato' ? 15 : 5);
    let error = Math.abs(alignment - target);
    health -= (error > 15 && weatherMult > 0.5) ? gameConfig.heatDamage : -0.02;
    health = Math.max(0, Math.min(100, health));

    // Update HUD
    let chargePercent = Math.min(100, (energy / ENERGY_GOAL) * 100);
    document.getElementById('pwr').innerText = Math.floor(energy) + "kW";
    document.getElementById('hlth').innerText = Math.floor(health) + "%";
    document.getElementById('batFill').style.height = chargePercent + "%";

    // Draw Panels
    const panelW = 75;
    const panelH = 45;
    const colSpacing = w / 3.5;
    const rowSpacing = 110;

    for(let i=0; i<3; i++) {
        for(let j=0; j<3; j++) {
            let x = (colSpacing * (i + 0.75)) - (panelW / 2);
            let y = (h * 0.5) + (j * rowSpacing);
            let skew = (tilt / 45) * 20;

            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath();
            ctx.moveTo(x-skew+8, y+8); ctx.lineTo(x+panelW-skew+8, y+8);
            ctx.lineTo(x+panelW+skew+8, y+panelH+8); ctx.lineTo(x+skew+8, y+panelH+8);
            ctx.fill();

            ctx.fillStyle = '#1e40af';
            ctx.strokeStyle = '#60a5fa';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x-skew, y); ctx.lineTo(x+panelW-skew, y);
            ctx.lineTo(x+panelW+skew, y+panelH); ctx.lineTo(x+skew, y+panelH);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
        }
    }

    if(health <= 0) { alert("Crops failed! The battery was only " + Math.floor(chargePercent) + "% full."); location.reload(); }
    if(energy >= ENERGY_GOAL) { alert("Battery Storage Full! Mission Success!"); location.reload(); }
    
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
